appId: com.example.imageviewer
productName: ImageViewer
copyright: Copyright (c) 2026
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: ImageViewer-${version}-${arch}.exe

fileAssociations:
  - ext: jpg
    name: JPEG Image
    description: JPEG image
    role: Viewer
  - ext: jpeg
    name: JPEG Image
    description: JPEG image
    role: Viewer
  - ext: png
    name: PNG Image
    description: PNG image
    role: Viewer
  - ext: webp
    name: WebP Image
    description: WebP image
    role: Viewer
  - ext: gif
    name: GIF Image
    description: GIF image
    role: Viewer

portable:
  artifactName: ImageViewer-${version}-portable.exe
