appId: com.example.imageviewer
productName: ImageViewer
copyright: Copyright (c) 2026
asar: true
asarUnpack:
  - node_modules/@bentopdf/gs-wasm/assets/**/*
electronLanguages:
  - en-US
  - ko
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - LICENSE
  - '!dist/tests/**'
  - '!**/*.map'
  - '!**/*.ts'
  - '!node_modules/gifuct-js/demo/**'

win:
  artifactName: ImageViewer-${version}-${arch}.exe
