name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: lint + typecheck + test + build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Electron renderer runtime smoke
        env:
          IMAGE_VIEWER_RUN_ELECTRON_SMOKE: '1'
        run: node --test dist/tests/renderer-runtime-smoke.test.js

      - name: Build
        run: npm run build

      - name: Package folder portable
        run: npm run dist

      - name: Audit portable folder
        run: npm run portable:audit

      - name: Upload folder-portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageViewerPortable-ci
          path: release/ImageViewerPortable
          if-no-files-found: error
          retention-days: 14
