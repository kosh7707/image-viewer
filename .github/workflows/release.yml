name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-build:
    name: Build Windows folder-portable zip and publish Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Electron renderer runtime smoke
        env:
          IMAGE_VIEWER_RUN_ELECTRON_SMOKE: '1'
        run: node --test dist/tests/renderer-runtime-smoke.test.js

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version $PKG_VERSION matches tag $GITHUB_REF_NAME"

      - name: Package folder portable
        run: npm run dist

      - name: Audit portable folder
        shell: pwsh
        run: node scripts/audit-portable-folder.js release/ImageViewerPortable > release/portable-audit.json

      - name: Zip portable folder and checksum
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $zip = "release/ImageViewerPortable-v$version-win-x64.zip"
          if (Test-Path $zip) {
            Remove-Item -LiteralPath $zip -Force
          }
          Compress-Archive -Path release/ImageViewerPortable -DestinationPath $zip -Force
          $item = Get-Item -LiteralPath $zip
          if ($item.Length -le 0) {
            throw "Portable zip is empty: $zip"
          }
          $hash = Get-FileHash -LiteralPath $zip -Algorithm SHA256
          "$($hash.Hash)  $($item.Name)" | Set-Content -Path release/SHA256SUMS.txt -Encoding ascii
          Get-ChildItem release/ImageViewerPortable-v*-win-x64.zip, release/SHA256SUMS.txt, release/portable-audit.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ImageViewerPortable-v*-win-x64.zip
            release/SHA256SUMS.txt
            release/portable-audit.json
          generate_release_notes: true
          fail_on_unmatched_files: true
