<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data: blob: file:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file:; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; frame-src 'none';"
    />
    <title>ImageViewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="boot-overlay" role="status" aria-live="polite">
      <div class="boot-card">
        <div class="boot-title">ImageViewer 로딩 중...</div>
        <div class="boot-progress" aria-hidden="true">
          <div class="boot-progress-bar"></div>
        </div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <img id="fallback-gif" hidden alt="" />
    <div id="toast-host"></div>
    <div id="dialog-host"></div>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
